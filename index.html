<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>INDAQUE - Pagos</title>

<style>
body {
    font-family: Arial;
    background-color: #f4f4f4;
    margin: 0;
}

header {
    background-color: black;
    color: orange;
    padding: 15px;
    text-align: center;
    font-size: 24px;
}

.container {
    text-align: center;
    margin-top: 50px;
}

input {
    padding: 10px;
    width: 200px;
}

button {
    padding: 10px;
    background-color: orange;
    border: none;
    cursor: pointer;
}

.resultado {
    margin-top: 20px;
    font-size: 18px;
}
</style>

</head>

<body>

<header>
    INDAQUE - Sistema de Pagos
</header>

<div class="container">
    <h2>Consultar Pago</h2>
    
    <input type="text" id="nombre" placeholder="Ingrese su nombre">
    <br><br>
    
    <button onclick="consultar()">Consultar</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
function consultar() {
    let nombre = document.getElementById("nombre").value;

    let empleados = {
        "juan": {dias: 15, pago: 300000},
        "maria": {dias: 20, pago: 450000},
        "pedro": {dias: 10, pago: 200000}
    };

    let emp = empleados[nombre.toLowerCase()];

    if(emp) {
        document.getElementById("resultado").innerHTML =
            "Días trabajados: " + emp.dias + "<br>" +
            "Pago total: ₡" + emp.pago;
    } else {
        document.getElementById("resultado").innerHTML =
            "Empleado no encontrado";
    }
}
</script>

</body>
</html>
